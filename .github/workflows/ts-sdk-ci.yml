name: TS SDK CI

on:
  push:
    branches: [master, release/**]
  pull_request:
    branches: [master, release/**]
  workflow_dispatch:

concurrency:
  group: ts-sdk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rock/ts-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          npm install -g pnpm

      - name: Install dependencies
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm install --frozen-lockfile

      - name: Run unit tests
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm test:unit
          
  integration-test:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # --- Python & ROCK Admin Setup ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ROCK Python dependencies
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[admin]"

      - name: Pull Docker image
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          docker pull python:3.11

      - name: Register Python shared libraries
        run: |
          # Ray workers need libpython3.11.so.1.0 but actions/setup-python doesn't register it system-wide
          PYTHON_LIB_DIR="$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')"
          echo "$PYTHON_LIB_DIR" | sudo tee /etc/ld.so.conf.d/python.conf
          sudo ldconfig
          echo "Registered Python lib dir: $PYTHON_LIB_DIR"

      - name: Start ROCK Admin service
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          export ROCK_WORKER_ENV_TYPE=uv
          nohup admin --env ci --role admin --port 8080 > /tmp/rock-admin.log 2>&1 &
          echo "Waiting for admin service to be ready..."
          for i in $(seq 1 60); do
            if grep -q "Uvicorn running on" /tmp/rock-admin.log 2>/dev/null; then
              echo "Admin service is ready!"
              break
            fi
            echo "Attempt $i/60: Admin not ready yet, waiting 2s..."
            sleep 2
          done
          if ! grep -q "Uvicorn running on" /tmp/rock-admin.log 2>/dev/null; then
            echo "ERROR: Admin service failed to start!"
            cat /tmp/rock-admin.log
            exit 1
          fi

      # --- Node.js & TS SDK Setup ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          npm install -g pnpm

      - name: Install TS SDK dependencies
        working-directory: rock/ts-sdk
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm install --frozen-lockfile

      # --- Run Integration Tests ---
      - name: Run integration tests
        working-directory: rock/ts-sdk
        env:
          ROCK_BASE_URL: http://127.0.0.1:8080
          ROCK_TEST_IMAGE: python:3.11
          ROCK_TEST_CLUSTER: default
        run: |
          echo "=== Task started at: $(date '+%Y-%m-%d %H:%M:%S') ==="
          pnpm test:integration

      # --- Cleanup & Diagnostics ---
      - name: Print admin logs on failure
        if: always()
        run: |
          echo "=== ROCK Admin Logs ==="
          cat /tmp/rock-admin.log || true
          echo "=== Docker Containers ==="
          docker ps -a || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          ray stop --force 2>/dev/null || true
          pkill -f "admin --env ci" 2>/dev/null || true
          sudo rm -f /etc/ld.so.conf.d/python.conf && sudo ldconfig 2>/dev/null || true
