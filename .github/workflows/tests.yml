name: Tests

on:
  push:
    branches:
      - master
      - release/**
  pull_request:
    branches:
      - master
      - release/**

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Unit tests ──
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group test

      - name: Run all unit tests
        run: |
          mkdir -p .tmp/test_data/logs
          uv run pytest tests/unit \
            --timeout=60 \
            --reruns 1 \
            --log-cli-level=WARNING \
            --tb=short \
            -v

  # ── Stage 2: Integration tests (Ray + Docker + Admin) ──
  integration-test:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group test

      - name: Pull Docker images
        run: docker pull python:3.11

      - name: Start Ray cluster
        run: |
          uv run ray start --head --disable-usage-stats --num-cpus=4 --memory=8589934592
          sleep 3
          uv run ray status

      - name: Run all integration tests
        run: |
          mkdir -p .tmp/test_data/logs
          uv run pytest tests/integration \
            --timeout=300 \
            --reruns 1 \
            --log-cli-level=WARNING \
            --tb=short \
            -v

      - name: Stop Ray cluster
        if: always()
        run: uv run ray stop --force || true
